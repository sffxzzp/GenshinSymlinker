name: build

on:
  repository_dispatch:
    types: [build-on-demand]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Go build (CLI)
        run: |
          mkdir -p ./dist
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o ./dist/GenshinSymlinker-cli.exe ./main.go
      - name: Go build (GUI)
        run: |
          mkdir -p ./dist
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -H=windowsgui" -o ./dist/GenshinSymlinker-gui.exe ./cmd/gui
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: GenshinSymlinker
          path: ./dist
